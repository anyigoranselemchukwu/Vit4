name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Backend Tests ──────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest

    env:
      AUTH_ENABLED: "false"
      VIT_DATABASE_URL: "sqlite+aiosqlite:///./test.db"
      JWT_SECRET_KEY: "ci-test-jwt-secret-key-not-for-production"
      SECRET_KEY: "ci-test-secret-key-not-for-production"
      USE_REAL_ML_MODELS: "false"
      BLOCKCHAIN_ENABLED: "false"
      RATE_LIMIT_ENABLED: "false"
      ENVIRONMENT: "development"
      FOOTBALL_DATA_API_KEY: ""
      THE_ODDS_API_KEY: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-asyncio pytest-cov coverage

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --asyncio-mode=auto \
            --cov=app \
            --cov=services \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --tb=short \
            -v \
            --timeout=60
        continue-on-error: false

      - name: Check coverage threshold
        run: |
          python -m coverage report --fail-under=30
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── Code Quality ───────────────────────────────────────────────────────────
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: |
          pip install flake8 pyflakes

      - name: Lint with flake8
        run: |
          flake8 app/ services/ main.py \
            --max-line-length=120 \
            --extend-ignore=E501,W503,E203,F401 \
            --exclude=alembic/,tests/,*.pyc,__pycache__ \
            --statistics
        continue-on-error: true

  # ── Frontend Build ─────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npm run typecheck
        continue-on-error: true

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production

  # ── Security Scan ──────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install safety
        run: pip install safety

      - name: Python dependency audit
        run: safety check -r requirements.txt --output text
        continue-on-error: true

      - name: npm audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── Integration Gate ───────────────────────────────────────────────────────
  integration-gate:
    name: All Checks Passed
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check all required jobs passed
        run: |
          if [ "${{ needs.backend-tests.result }}" != "success" ]; then
            echo "❌ Backend tests failed"
            exit 1
          fi
          if [ "${{ needs.frontend-build.result }}" != "success" ]; then
            echo "❌ Frontend build failed"
            exit 1
          fi
          echo "✅ All required checks passed"
